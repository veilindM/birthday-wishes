<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Angel 💖</title>

    <!-- THIS LINE CONNECTS YOUR CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="scene">

    <!-- Title -->
    <h1 class="title">Happy Birthday</h1>
    <div class="name-container">
        <img src="images/shell-name.png" class="shell-name">
        <h2 class="name">Angel</h2>
    </div>

    <!-- Characters -->
    <img src="images/ariel-1.png" class="ariel">
    <img src="images/fish.png" class="fish">

    <!-- Balloons -->
    <img src="images/balloon.png" class="balloons">

    <!-- Chat bubble top -->
    <div class="chat chat-top">
        I know this is freaking childish, but let’s have some fun!
    </div>

    <!-- Photo frame -->
    <div class="photo-frame">
        <img src="images/angel.jpg">
    </div>

    <!-- Text beside photo -->
    <div class="text-block">
        <p>OMG, I got no photo of you, I hope this is enough 😭</p>
        <p>WOAHH! look at that independent woman working. I can see a future boss here 😎</p>
    </div>

    <!-- Bottom characters -->
    <img src="images/lobster.png" class="crab">
    <img src="images/shell.png" class="shell left">
    <img src="images/shell.png" class="shell right">

    <!-- Bottom chat -->
    <div class="chat chat-bottom">
        Hey Yoo! Forget about the music lol! Let’s dance!
    </div>

</div>

</body>
