<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Section 1 Debug</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

/* GLOBAL */
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: url('images/background.png') center/cover no-repeat;
}

/* SECTION */
.section {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 20px;
    box-sizing: border-box;
}

/* HEADER */
.header {
    text-align: center;
}

.hb-text {
    font-size: clamp(20px, 4vw, 36px);
    font-family: 'Gellatio', sans-serif;
}

.name-wrapper {
    position: relative;
    width: 80%;
    margin: 10px auto 0;
}

.shell-bg {
    width: 100%;
}

.name-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: clamp(26px, 6vw, 42px);
    font-family: cursive;
    white-space: nowrap;
}

/* CONTENT */
.content {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
}

/* LEFT IMAGE */
.left {
    flex: 1;
    display: flex;
    justify-content: center;
}

.left img {
    width: 100%;
    max-width: 180px;
}

/* CENTER PHOTO */
.center {
    flex: 1;
    position: relative;
    display: flex;
    justify-content: center;
}

.frame {
    width: 100%;
    max-width: 250px;
}

.photo {
    position: absolute;
    top: 30%;
    width: 50%;
    border-radius: 8px;
}

/* RIGHT TEXT */
.right {
    flex: 1;
    font-size: clamp(12px, 2.5vw, 16px);
}

/* FOOTER */
.footer {
    text-align: center;
}

.footer img {
    width: 120px;
}

/* OPTIONAL: BIAR KELIHATAN STRUKTUR SAAT DEBUG */
.section,
.header,
.content,
.footer {
    /* hapus ini kalau sudah selesai debug */
    /* border: 1px dashed rgba(0,0,0,0.2); */
}

</style>
</head>

<body>

<div class="section">

    <!-- HEADER -->
    <div class="header">
        <div class="hb-text">Happy Birthday</div>

        <div class="name-wrapper">
            <img src="images/shell-name.png" class="shell-bg">
            <div class="name-text">Angel</div>
        </div>
    </div>

    <!-- CONTENT -->
    <div class="content">

        <!-- LEFT -->
        <div class="left">
            <img src="images/ariel-1.png" alt="Ariel">
        </div>

        <!-- CENTER -->
        <div class="center">
            <img src="images/star-frame.png" class="frame">
            <img src="images/angel.jpg" class="photo">
        </div>

        <!-- RIGHT -->
        <div class="right">
            OMG, I got no photo of you 😭 <br><br>
            Future boss energy 😎
        </div>

    </div>

    <!-- FOOTER -->
    <div class="footer">
        <img src="images/lobster.png">
    </div>

</div>

</body>
</html>
